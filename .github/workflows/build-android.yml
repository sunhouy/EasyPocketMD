name: Build Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish to GitHub Release (e.g. v1.2.3); leave empty to build only'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_NDK_VERSION: '26.3.11579264'


jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Emscripten
        run: |
          if [ ! -d "$HOME/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Build WASM text engine
        run: npm run wasm:text:build

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Upload WASM build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: |
            wasm_text_engine/dist/text_engine.js
            wasm_text_engine/dist/text_engine.wasm
          if-no-files-found: error

  build-tauri-android:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download WASM build artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          echo "y" | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Build web frontend
        run: npm run build:web

      - name: Extract version from tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) version = parts[0] + '.0.0';
            else if (parts.length === 2) version = parts[0] + '.' + parts[1] + '.0';
            else if (parts.length >= 3) version = parts[0] + '.' + parts[1] + '.' + parts[2];
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync app versions
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauriConfig.version = version;
              if (tauriConfig.package) delete tauriConfig.package;
            fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2));

            const cargoPath = "src-tauri/Cargo.toml";
            const cargoRaw = fs.readFileSync(cargoPath, "utf8");
            const patched = cargoRaw.replace(/^version\s*=\s*"[^"]+"/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, patched);
          '

      - name: Initialize Android project (if needed)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "src-tauri/gen/android" ]; then
            npm run tauri:android:init
          fi

      - name: Setup Android signing keystore (from secrets)
        env:
          JKS_BASE64: ${{ secrets.JKS_BASE64 }}
          JKS_ALIAS: ${{ secrets.JKS_ALIAS }}
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JKS_BASE64:-}" ] || [ -z "${JKS_ALIAS:-}" ] || [ -z "${JKS_PASSWORD:-}" ]; then
            if [ "${IS_RELEASE}" = "true" ]; then
              echo "Missing required signing secrets (JKS_BASE64 / JKS_ALIAS / JKS_PASSWORD) for release build"
              exit 1
            fi
            echo "Signing secrets not configured. Continue with unsigned/non-release signing."
            exit 0
          fi

          mkdir -p src-tauri/gen/android/app
          printf '%s' "$JKS_BASE64" | base64 --decode > src-tauri/gen/android/app/release.keystore
          chmod 600 src-tauri/gen/android/app/release.keystore

          cat > src-tauri/gen/android/keystore.properties <<EOF
          storePassword=${JKS_PASSWORD}
          keyPassword=${JKS_PASSWORD}
          keyAlias=${JKS_ALIAS}
          storeFile=app/release.keystore
          EOF

          cat > src-tauri/gen/android/key.properties <<EOF
          storePassword=${JKS_PASSWORD}
          keyPassword=${JKS_PASSWORD}
          keyAlias=${JKS_ALIAS}
          storeFile=app/release.keystore
          EOF

      - name: Build Tauri Android APK
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/app/release.keystore
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.JKS_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.JKS_PASSWORD }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: npm run tauri:android:build

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-tauri-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

  publish-release-android:
    needs: build-tauri-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-android
          path: downloads/android

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Android release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          APK_FILE=$(find downloads/android -type f -name "*.apk" | head -n 1)
          if [ -z "${APK_FILE:-}" ]; then
            echo "Missing Android APK artifact"
            exit 1
          fi

          cp "$APK_FILE" "release/easypocketmd-${{ steps.meta.outputs.version }}-android.apk"

          AAB_FILE=$(find downloads/android -type f -name "*.aab" | head -n 1 || true)
          if [ -n "${AAB_FILE:-}" ]; then
            cp "$AAB_FILE" "release/easypocketmd-${{ steps.meta.outputs.version }}-android.aab"
          fi

      - name: Upload Android assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: |
            release/*.apk
            release/*.aab
          overwrite_files: true
          fail_on_unmatched_files: false

  deploy-android:
    needs: build-tauri-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-android
          path: downloads/android

      - name: Create android directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/android

      - name: Upload Android artifacts to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: downloads/android/*
          target: /www/wwwroot/static/android
          strip_components: 2
