name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则使用当前 ref 的 tag）'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}


      - name: Setup Emscripten
        run: |
          if [ ! -d "$HOME/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Build WASM text engine
        run: npm run wasm:text:build

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Upload WASM build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: |
            wasm_text_engine/dist/text_engine.js
            wasm_text_engine/dist/text_engine.wasm
          if-no-files-found: error

  build-electron:
    needs: build-wasm
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:electron:win
            artifactName: md-electron-win
          - os: ubuntu-latest
            script: build:electron:linux
            artifactName: md-electron-linux
          - os: macos-latest
            script: build:electron:mac
            artifactName: md-electron-mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download WASM build artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install dependencies
        shell: bash
        run: |
          # Clean install to avoid rollup platform-specific module issues
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Extract version from tag
        id: extract-version
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) {
              version = parts[0] + '.0.0';
            } else if (parts.length === 2) {
              version = parts[0] + '.' + parts[1] + '.0';
            } else if (parts.length >= 3) {
              version = parts[0] + '.' + parts[1] + '.' + parts[2];
            }
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Update package.json version
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.env.VERSION;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          '

      - name: Build web app (Vite)
        run: npm run build:web

      - name: Verify WASM packaged in dist
        run: npm run wasm:text:verify:dist

      - name: Build Electron app (${{ matrix.script }})
        run: npm run ${{ matrix.script }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            dist-electron-new/**
          if-no-files-found: warn

  publish-electron-release:
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Download Windows Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-win
          path: downloads/electron/win

      - name: Download Linux Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-linux
          path: downloads/electron/linux

      - name: Download macOS Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-mac
          path: downloads/electron/mac

      - name: Prepare release assets
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          TAG_NAME=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          
          # Create release directory
          mkdir -p release
          
          # Find and copy only the setup file, excluding elevate.exe
          setup_file=$(find downloads/electron/win -name "*.exe" -not -name "elevate.exe" | grep -i setup | head -1)
          if [ -n "$setup_file" ]; then
            cp "$setup_file" "release/easypocketmd-$VERSION.exe"
            echo "Copied setup file: $(basename "$setup_file") -> easypocketmd-$VERSION.exe"
          else
            # If no setup file found, try to find any exe file
            exe_file=$(find downloads/electron/win -name "*.exe" -not -name "elevate.exe" | head -1)
            if [ -n "$exe_file" ]; then
              cp "$exe_file" "release/easypocketmd-$VERSION.exe"
              echo "Copied exe file: $(basename "$exe_file") -> easypocketmd-$VERSION.exe"
            else
              echo "No exe files found"
            fi
          fi
          
          # Copy Linux deb files
          cp downloads/electron/linux/*.deb release/ || true
          
          # Copy Linux AppImage files
          cp downloads/electron/linux/*.AppImage release/ || true
          
          # Copy macOS dmg files
          cp downloads/electron/mac/*.dmg release/ || true

      - name: Upload Electron assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            release/easypocketmd-*.exe
            release/*.deb
            release/*.AppImage
            release/*.dmg

  deploy-electron:
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      # 下载 Windows 产物
      - name: Download Windows Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-win
          path: downloads/electron/win

      # 下载 Linux 产物
      - name: Download Linux Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-linux
          path: downloads/electron/linux

      # 下载 macOS 产物
      - name: Download macOS Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-mac
          path: downloads/electron/mac

      # 在服务器上创建对应目录
      - name: Create electron directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /www/wwwroot/static/electron/win
            mkdir -p /www/wwwroot/static/electron/linux
            mkdir -p /www/wwwroot/static/electron/macos

      # 准备部署产物（仅安装包，且使用固定文件名）
      - name: Prepare deployment installer files
        run: |
          mkdir -p deploy/win deploy/linux deploy/macos
          
          # Windows: 仅保留安装包，重命名为 easypocketmd_windows.exe
          setup_file=$(find downloads/electron/win -name "*.exe" -not -name "elevate.exe" | grep -i setup | head -1)
          if [ -n "$setup_file" ]; then
            cp "$setup_file" "deploy/win/easypocketmd_windows.exe"
            echo "Prepared Windows installer: easypocketmd_windows.exe"
          else
            exe_file=$(find downloads/electron/win -name "*.exe" -not -name "elevate.exe" | head -1)
            if [ -n "$exe_file" ]; then
              cp "$exe_file" "deploy/win/easypocketmd_windows.exe"
              echo "Prepared Windows installer from fallback exe: easypocketmd_windows.exe"
            else
              echo "No Windows installer (.exe) found"
              exit 1
            fi
          fi

          # Linux: 仅保留 .deb 和 .AppImage，统一重命名
          linux_deb=$(find downloads/electron/linux -name "*.deb" | head -1)
          if [ -n "$linux_deb" ]; then
            cp "$linux_deb" "deploy/linux/easypocketmd_linux.deb"
            echo "Prepared Linux installer: easypocketmd_linux.deb"
          else
            echo "No Linux installer (.deb) found"
            exit 1
          fi

          linux_appimage=$(find downloads/electron/linux -name "*.AppImage" | head -1)
          if [ -n "$linux_appimage" ]; then
            cp "$linux_appimage" "deploy/linux/easypocketmd_linux.appimage"
            echo "Prepared Linux installer: easypocketmd_linux.appimage"
          else
            echo "No Linux installer (.AppImage) found"
            exit 1
          fi

          # macOS: 仅保留 .dmg，重命名为 easypocketmd_macos.dmg
          mac_dmg=$(find downloads/electron/mac -name "*.dmg" | head -1)
          if [ -n "$mac_dmg" ]; then
            cp "$mac_dmg" "deploy/macos/easypocketmd_macos.dmg"
            echo "Prepared macOS installer: easypocketmd_macos.dmg"
          else
            echo "No macOS installer (.dmg) found"
            exit 1
          fi

      # 上传 Windows 产物
      - name: Upload Windows Electron artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/win/easypocketmd_windows.exe"
          target: "/www/wwwroot/static/electron/win"
          strip_components: 2   # 去除 deploy/win/ 前缀

      # 上传 Linux 产物
      - name: Upload Linux Electron artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/linux/*"
          target: "/www/wwwroot/static/electron/linux"
          strip_components: 2   # 去除 deploy/linux/ 前缀

      # 上传 macOS 产物
      - name: Upload macOS Electron artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/macos/easypocketmd_macos.dmg"
          target: "/www/wwwroot/static/electron/macos"
          strip_components: 2   # 去除 deploy/macos/ 前缀