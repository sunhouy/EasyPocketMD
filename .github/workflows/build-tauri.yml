name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则只构建不发版）'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '24'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Emscripten
        run: |
          if [ ! -d "$HOME/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Build WASM text engine
        run: npm run wasm:text:build

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Generate Tauri icons
        run: npx tauri icon src-tauri/icon-rgba.png

      - name: Upload WASM build artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-text-engine-dist
          path: |
            wasm_text_engine/dist/text_engine.js
            wasm_text_engine/dist/text_engine.wasm
          if-no-files-found: error

  build-tauri-linux:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download WASM build artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies (modern)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup2.4-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

          if apt-cache show libsoup-3.0-dev >/dev/null 2>&1; then
            sudo apt-get install -y libsoup-3.0-dev
          fi

      - name: Linux compatibility aliases for tauri v1
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.pkgconfig"
          mkdir -p "$HOME/.libalias"

          JSC_PC_DIR="$(pkg-config --variable=pcfiledir javascriptcoregtk-4.1)"
          WEBKIT_PC_DIR="$(pkg-config --variable=pcfiledir webkit2gtk-4.1)"
          JSC_LIB_DIR="$(pkg-config --variable=libdir javascriptcoregtk-4.1)"
          WEBKIT_LIB_DIR="$(pkg-config --variable=libdir webkit2gtk-4.1)"

          ln -sf "$JSC_PC_DIR/javascriptcoregtk-4.1.pc" "$HOME/.pkgconfig/javascriptcoregtk-4.0.pc"
          ln -sf "$WEBKIT_PC_DIR/webkit2gtk-4.1.pc" "$HOME/.pkgconfig/webkit2gtk-4.0.pc"
          ln -sf "$JSC_LIB_DIR/libjavascriptcoregtk-4.1.so" "$HOME/.libalias/libjavascriptcoregtk-4.0.so"
          ln -sf "$WEBKIT_LIB_DIR/libwebkit2gtk-4.1.so" "$HOME/.libalias/libwebkit2gtk-4.0.so"

          export PKG_CONFIG_PATH="$HOME/.pkgconfig:$JSC_PC_DIR:$WEBKIT_PC_DIR:/usr/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export LIBRARY_PATH="$HOME/.libalias:${LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="$HOME/.libalias:${LD_LIBRARY_PATH:-}"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

          pkg-config --print-errors --modversion javascriptcoregtk-4.0
          pkg-config --print-errors --modversion webkit2gtk-4.0
          pkg-config --print-errors --modversion libsoup-2.4
          ls -l "$HOME/.libalias"

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Extract version from tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) version = parts[0] + '.0.0';
            else if (parts.length === 2) version = parts[0] + '.' + parts[1] + '.0';
            else if (parts.length >= 3) version = parts[0] + '.' + parts[1] + '.' + parts[2];
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync app versions
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauriConfig.version = version;
            if (tauriConfig.package) delete tauriConfig.package;
            fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2));

            const cargoPath = "src-tauri/Cargo.toml";
            const cargoRaw = fs.readFileSync(cargoPath, "utf8");
            const patched = cargoRaw.replace(/^version\\s*=\\s*"[^"]+"/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, patched);
          '

      - name: Build Tauri app (Linux)
        run: npm run build:tauri:linux

      - name: Normalize Debian package dependencies
        shell: bash
        run: |
          set -euo pipefail
          DEB_FILE="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -n 1)"
          if [ -z "${DEB_FILE:-}" ]; then
            echo "No .deb file found after Linux build"
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          UNPACK_DIR="$TMP_DIR/unpack"
          mkdir -p "$UNPACK_DIR"
          dpkg-deb -R "$DEB_FILE" "$UNPACK_DIR"

          CONTROL_FILE="$UNPACK_DIR/DEBIAN/control"
          OLD_DEPENDS="$(dpkg-deb -f "$DEB_FILE" Depends || true)"
          echo "Original Debian Depends: $OLD_DEPENDS"

              NEW_DEPENDS="$(OLD_DEPENDS="$OLD_DEPENDS" python3 -c 'import os,sys; raw=os.environ.get("OLD_DEPENDS","").strip(); parts=[part.strip() for part in raw.split(",") if part.strip()]; required=["libwebkit2gtk-4.1-0","libjavascriptcoregtk-4.1-0","libsoup-3.0-0","libgtk-3-0"]; seen=set(); result=[]; add_dep=lambda dep: None if (not dep or dep == "libwebkit2gtk-4.0-37" or dep in seen) else (seen.add(dep), result.append(dep)); [add_dep(part) for part in parts]; [add_dep(dep) for dep in required]; sys.stdout.write(", ".join(result))')"
          echo "Normalized Debian Depends: $NEW_DEPENDS"

          awk '
            BEGIN {skip=0}
            {
              if (skip) {
                if ($0 ~ /^[[:space:]]/) {
                  next;
                }
                skip=0;
              }
              if ($0 ~ /^Depends:/) {
                skip=1;
                next;
              }
              print;
            }
          ' "$CONTROL_FILE" > "$CONTROL_FILE.cleaned"
          mv "$CONTROL_FILE.cleaned" "$CONTROL_FILE"

          printf 'Depends: %s\n' "$NEW_DEPENDS" >> "$CONTROL_FILE"

          dpkg-deb -b "$UNPACK_DIR" "$DEB_FILE"

      - name: Validate Debian package dependencies
        shell: bash
        run: |
          set -euo pipefail
          DEB_FILE="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -n 1)"
          if [ -z "${DEB_FILE:-}" ]; then
            echo "No .deb file found after Linux build"
            exit 1
          fi

          DEPENDS="$(dpkg-deb -f "$DEB_FILE" Depends || true)"
          echo "Debian Depends: $DEPENDS"

          echo "$DEPENDS" | grep -q "libwebkit2gtk-4.1-0"
          if echo "$DEPENDS" | grep -q "libwebkit2gtk-4.0-37"; then
            echo "Legacy dependency detected: libwebkit2gtk-4.0-37"
            exit 1
          fi
          echo "$DEPENDS" | grep -q "libjavascriptcoregtk-4.1-0"
          echo "$DEPENDS" | grep -q "libsoup-3.0-0"

      - name: Upload Linux Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: md-tauri-linux
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  build-tauri-windows:
    needs: build-wasm
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download WASM build artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clean install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Extract version from tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) version = parts[0] + '.0.0';
            else if (parts.length === 2) version = parts[0] + '.' + parts[1] + '.0';
            else if (parts.length >= 3) version = parts[0] + '.' + parts[1] + '.' + parts[2];
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync app versions
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauriConfig.version = version;
              if (tauriConfig.package) delete tauriConfig.package;
            fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2));

            const cargoPath = "src-tauri/Cargo.toml";
            const cargoRaw = fs.readFileSync(cargoPath, "utf8");
            const patched = cargoRaw.replace(/^version\\s*=\\s*"[^"]+"/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, patched);
          '

      - name: Build Tauri app (Windows)
        run: npm run build:tauri:win

      - name: Upload Windows Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: md-tauri-win
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  build-tauri-macos:
    needs: build-wasm
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download WASM build artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clean install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Extract version from tag
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) version = parts[0] + '.0.0';
            else if (parts.length === 2) version = parts[0] + '.' + parts[1] + '.0';
            else if (parts.length >= 3) version = parts[0] + '.' + parts[1] + '.' + parts[2];
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync app versions
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauriConfig.version = version;
            if (tauriConfig.package) delete tauriConfig.package;
            fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2));

            const cargoPath = "src-tauri/Cargo.toml";
            const cargoRaw = fs.readFileSync(cargoPath, "utf8");
            const patched = cargoRaw.replace(/^version\\s*=\\s*"[^"]+"/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, patched);
          '

      - name: Build Tauri app (macOS)
        run: npm run build:tauri:mac

      - name: Upload macOS Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: md-tauri-mac
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish-release-linux:
    needs: build-tauri-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download Linux Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-linux
          path: downloads/linux

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Linux release assets
        shell: bash
        run: |
          mkdir -p release
          linux_deb=$(find downloads/linux -name "*.deb" | head -1)
          linux_appimage=$(find downloads/linux -name "*.AppImage" | head -1)

          if [ -z "$linux_deb" ] || [ -z "$linux_appimage" ]; then
            echo "Missing Linux bundle files (.deb/.AppImage)"
            exit 1
          fi

          cp "$linux_deb" "release/easypocketmd-${{ steps.meta.outputs.version }}-linux-amd64.deb"
          cp "$linux_appimage" "release/easypocketmd-${{ steps.meta.outputs.version }}-linux-amd64.AppImage"

      - name: Upload Linux assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: |
            release/*.deb
            release/*.AppImage
          overwrite_files: true
          fail_on_unmatched_files: true

  publish-release-windows:
    needs: build-tauri-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download Windows Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-win
          path: downloads/win

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Windows release assets
        shell: bash
        run: |
          mkdir -p release
          win_installer=$(find downloads/win -name "*.exe" | head -1)

          if [ -z "$win_installer" ]; then
            echo "Missing Windows installer (.exe)"
            exit 1
          fi

          cp "$win_installer" "release/easypocketmd-${{ steps.meta.outputs.version }}-windows-x64.exe"

      - name: Upload Windows assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: release/*.exe
          overwrite_files: true
          fail_on_unmatched_files: true

  publish-release-macos:
    needs: build-tauri-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download macOS Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-mac
          path: downloads/mac

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS release assets
        shell: bash
        run: |
          mkdir -p release
          mac_dmg=$(find downloads/mac -name "*.dmg" | head -1)

          if [ -z "$mac_dmg" ]; then
            echo "Missing macOS installer (.dmg)"
            exit 1
          fi

          cp "$mac_dmg" "release/easypocketmd-${{ steps.meta.outputs.version }}-macos-universal.dmg"

      - name: Upload macOS assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: release/*.dmg
          overwrite_files: true
          fail_on_unmatched_files: true

  deploy-tauri-linux:
    needs: build-tauri-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-linux
          path: downloads/linux

      - name: Ensure Linux deploy directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/tauri/linux

      - name: Prepare Linux deployment files
        shell: bash
        run: |
          mkdir -p deploy/linux

          linux_deb=$(find downloads/linux -name "*.deb" | head -1)

          if [ -z "$linux_deb" ]; then
            echo "Missing Linux installer (.deb)"
            exit 1
          fi

          cp "$linux_deb" "deploy/linux/easypocketmd_linux.deb"

      - name: Upload Linux Tauri artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: deploy/linux/easypocketmd_linux.deb
          target: /www/wwwroot/static/tauri/linux
          strip_components: 2

  deploy-tauri-windows:
    needs: build-tauri-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-win
          path: downloads/win

      - name: Ensure Windows deploy directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/tauri/win

      - name: Prepare Windows deployment file
        shell: bash
        run: |
          mkdir -p deploy/win
          win_installer=$(find downloads/win -name "*.exe" | head -1)

          if [ -z "$win_installer" ]; then
            echo "Missing Windows installer (.exe)"
            exit 1
          fi

          cp "$win_installer" "deploy/win/easypocketmd_windows.exe"

      - name: Upload Windows Tauri artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: deploy/win/easypocketmd_windows.exe
          target: /www/wwwroot/static/tauri/win
          strip_components: 2

  deploy-tauri-macos:
    needs: build-tauri-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Tauri artifact
        uses: actions/download-artifact@v8
        with:
          name: md-tauri-mac
          path: downloads/mac

      - name: Ensure macOS deploy directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/tauri/macos

      - name: Prepare macOS deployment file
        shell: bash
        run: |
          mkdir -p deploy/macos
          mac_dmg=$(find downloads/mac -name "*.dmg" | head -1)

          if [ -z "$mac_dmg" ]; then
            echo "Missing macOS installer (.dmg)"
            exit 1
          fi

          cp "$mac_dmg" "deploy/macos/easypocketmd_macos.dmg"

      - name: Upload macOS Tauri artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: deploy/macos/easypocketmd_macos.dmg
          target: /www/wwwroot/static/tauri/macos
          strip_components: 2
