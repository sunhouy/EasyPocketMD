name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则使用当前 ref 的 tag）'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Emscripten
        run: |
          if [ ! -d "$HOME/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Build WASM text engine
        run: npm run wasm:text:build

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Upload WASM build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: |
            wasm_text_engine/dist/text_engine.js
            wasm_text_engine/dist/text_engine.wasm
          if-no-files-found: error

  build-tauri:
    needs: build-wasm
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:tauri:win
            artifactName: md-tauri-win
          - os: ubuntu-latest
            script: build:tauri:linux
            artifactName: md-tauri-linux
          - os: macos-latest
            script: build:tauri:mac
            artifactName: md-tauri-mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download WASM build artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-text-engine-dist
          path: wasm_text_engine/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Clean install dependencies
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Verify WASM source artifacts
        run: npm run wasm:text:verify

      - name: Extract version from tag
        id: extract-version
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=$(node -e "
            let tagName = process.argv[1];
            let version = tagName.replace(/^v/, '');
            if (!/^\\d+(?:\\.\\d+){0,2}$/.test(version)) {
              version = require('./package.json').version || '0.0.0';
            }
            const parts = version.split('.').filter(Boolean);
            if (parts.length === 1) version = parts[0] + '.0.0';
            else if (parts.length === 2) version = parts[0] + '.' + parts[1] + '.0';
            else if (parts.length >= 3) version = parts[0] + '.' + parts[1] + '.' + parts[2];
            if (!/^\\d+\\.\\d+\\.\\d+$/.test(version)) {
              console.error('Invalid version resolved:', version);
              process.exit(1);
            }
            console.log(version);
          " "$TAG_NAME")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Sync app versions
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;

            const pkgPath = "package.json";
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

            const tauriPath = "src-tauri/tauri.conf.json";
            const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, "utf8"));
            tauriConfig.package = tauriConfig.package || {};
            tauriConfig.package.version = version;
            fs.writeFileSync(tauriPath, JSON.stringify(tauriConfig, null, 2));

            const cargoPath = "src-tauri/Cargo.toml";
            const cargoRaw = fs.readFileSync(cargoPath, "utf8");
            const patched = cargoRaw.replace(/^version\\s*=\\s*"[^"]+"/m, `version = "${version}"`);
            fs.writeFileSync(cargoPath, patched);
          '

      - name: Build Tauri app (${{ matrix.script }})
        run: npm run ${{ matrix.script }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: warn

  publish-tauri-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download Windows Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-win
          path: downloads/tauri/win

      - name: Download Linux Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-linux
          path: downloads/tauri/linux

      - name: Download macOS Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-mac
          path: downloads/tauri/mac

      - name: Prepare release assets
        run: |
          TAG_NAME=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          mkdir -p release

          win_installer=$(find downloads/tauri/win -name "*.exe" | head -1)
          if [ -n "$win_installer" ]; then
            cp "$win_installer" "release/easypocketmd-$VERSION.exe"
          fi

          linux_deb=$(find downloads/tauri/linux -name "*.deb" | head -1)
          if [ -n "$linux_deb" ]; then
            cp "$linux_deb" release/
          fi

          linux_appimage=$(find downloads/tauri/linux -name "*.AppImage" | head -1)
          if [ -n "$linux_appimage" ]; then
            cp "$linux_appimage" release/
          fi

          mac_dmg=$(find downloads/tauri/mac -name "*.dmg" | head -1)
          if [ -n "$mac_dmg" ]; then
            cp "$mac_dmg" release/
          fi

      - name: Upload Tauri assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            release/easypocketmd-*.exe
            release/*.deb
            release/*.AppImage
            release/*.dmg

  deploy-tauri:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-win
          path: downloads/tauri/win

      - name: Download Linux Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-linux
          path: downloads/tauri/linux

      - name: Download macOS Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: md-tauri-mac
          path: downloads/tauri/mac

      - name: Create tauri directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /www/wwwroot/static/tauri/win
            mkdir -p /www/wwwroot/static/tauri/linux
            mkdir -p /www/wwwroot/static/tauri/macos

      - name: Prepare deployment installer files
        run: |
          mkdir -p deploy/win deploy/linux deploy/macos

          win_installer=$(find downloads/tauri/win -name "*.exe" | head -1)
          if [ -n "$win_installer" ]; then
            cp "$win_installer" "deploy/win/easypocketmd_windows.exe"
          else
            echo "No Windows installer (.exe) found"
            exit 1
          fi

          linux_deb=$(find downloads/tauri/linux -name "*.deb" | head -1)
          if [ -n "$linux_deb" ]; then
            cp "$linux_deb" "deploy/linux/easypocketmd_linux.deb"
          else
            echo "No Linux installer (.deb) found"
            exit 1
          fi

          linux_appimage=$(find downloads/tauri/linux -name "*.AppImage" | head -1)
          if [ -n "$linux_appimage" ]; then
            cp "$linux_appimage" "deploy/linux/easypocketmd_linux.appimage"
          else
            echo "No Linux installer (.AppImage) found"
            exit 1
          fi

          mac_dmg=$(find downloads/tauri/mac -name "*.dmg" | head -1)
          if [ -n "$mac_dmg" ]; then
            cp "$mac_dmg" "deploy/macos/easypocketmd_macos.dmg"
          else
            echo "No macOS installer (.dmg) found"
            exit 1
          fi

      - name: Upload Windows Tauri artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/win/easypocketmd_windows.exe"
          target: "/www/wwwroot/static/tauri/win"
          strip_components: 2

      - name: Upload Linux Tauri artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/linux/*"
          target: "/www/wwwroot/static/tauri/linux"
          strip_components: 2

      - name: Upload macOS Tauri artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy/macos/easypocketmd_macos.dmg"
          target: "/www/wwwroot/static/tauri/macos"
          strip_components: 2
