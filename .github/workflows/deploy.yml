name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则使用当前 ref 的 tag）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Clean workspace (node_modules)
      run: |
        rm -rf node_modules
        rm -rf **/node_modules || true

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Create deployment tarball
      run: |
        mkdir -p deploy_tmp
        cp -r dist api print package.json package-lock.json nginx.conf sw.js manifest.webmanifest icon-192.png icon-512.png deploy_tmp/
        tar -czf deploy.tar.gz -C deploy_tmp .

    - name: Prepare and execute zero-downtime deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          set -e

          # 定义目录
          GREEN_DIR="/www/wwwroot/js_green"
          BLUE_DIR="/www/wwwroot/js_blue"
          SHARED_DIR="/www/wwwroot/js_shared"
          LINK_PATH="/www/wwwroot/js"

          # 创建必要的目录
          mkdir -p "$GREEN_DIR" "$BLUE_DIR" "$SHARED_DIR/uploads" "$SHARED_DIR/user_uploads" "$SHARED_DIR/user_files"

          # 确定当前和下一个部署目录
          if [ -L "$LINK_PATH" ]; then
            CURRENT_TARGET=$(readlink -f "$LINK_PATH")
            if [ "$CURRENT_TARGET" = "$GREEN_DIR" ]; then
              NEXT_DIR="$BLUE_DIR"
              NEXT_NAME="md-server-blue"
              CURRENT_NAME="md-server-green"
              echo "当前: green -> 切换到: blue"
            else
              NEXT_DIR="$GREEN_DIR"
              NEXT_NAME="md-server-green"
              CURRENT_NAME="md-server-blue"
              echo "当前: blue -> 切换到: green"
            fi
          else
            NEXT_DIR="$GREEN_DIR"
            NEXT_NAME="md-server-green"
            CURRENT_NAME=""
            echo "首次部署到: green"
          fi

          # 清理下一个部署目录
          echo "清理 $NEXT_DIR..."
          rm -rf "${NEXT_DIR:?}/"*

          # 等待上传文件（文件会通过 SCP 上传到临时位置）
          echo "等待部署包..."

    - name: Upload deployment tarball
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "deploy.tar.gz"
        target: "/tmp"
        strip_components: 0

    - name: Extract and setup deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          set -e

          GREEN_DIR="/www/wwwroot/js_green"
          BLUE_DIR="/www/wwwroot/js_blue"
          SHARED_DIR="/www/wwwroot/js_shared"
          LINK_PATH="/www/wwwroot/js"

          # 确定目标目录
          if [ -L "$LINK_PATH" ]; then
            CURRENT_TARGET=$(readlink -f "$LINK_PATH")
            if [ "$CURRENT_TARGET" = "$GREEN_DIR" ]; then
              NEXT_DIR="$BLUE_DIR"
            else
              NEXT_DIR="$GREEN_DIR"
            fi
          else
            NEXT_DIR="$GREEN_DIR"
          fi

          echo "解压部署包到 $NEXT_DIR..."
          tar -xzf /tmp/deploy.tar.gz -C "$NEXT_DIR"

          # 设置共享目录符号链接
          cd "$NEXT_DIR"
          rm -rf uploads user_uploads user_files
          ln -s "$SHARED_DIR/uploads" uploads
          ln -s "$SHARED_DIR/user_uploads" user_uploads
          ln -s "$SHARED_DIR/user_files" user_files

          # 安装依赖
          echo "安装依赖..."
          npm install --omit=dev --prefer-offline

          echo "部署目录准备完成: $NEXT_DIR"

    - name: Zero-downtime switch
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          set -e

          GREEN_DIR="/www/wwwroot/js_green"
          BLUE_DIR="/www/wwwroot/js_blue"
          LINK_PATH="/www/wwwroot/js"

          # 确定当前和下一个部署
          if [ -L "$LINK_PATH" ]; then
            CURRENT_TARGET=$(readlink -f "$LINK_PATH")
            if [ "$CURRENT_TARGET" = "$GREEN_DIR" ]; then
              NEXT_DIR="$BLUE_DIR"
              NEXT_NAME="md-server-blue"
              CURRENT_NAME="md-server-green"
            else
              NEXT_DIR="$GREEN_DIR"
              NEXT_NAME="md-server-green"
              CURRENT_NAME="md-server-blue"
            fi
          else
            NEXT_DIR="$GREEN_DIR"
            NEXT_NAME="md-server-green"
            CURRENT_NAME=""
          fi

          echo "在新目录启动服务: $NEXT_NAME"
          cd "$NEXT_DIR"

          # 启动或重载新服务
          if ! pm2 describe "$NEXT_NAME" > /dev/null 2>&1; then
            echo "启动新服务: $NEXT_NAME"
            PORT=3001 pm2 start api/server.js --name "$NEXT_NAME" --env production
          else
            echo "重载现有服务: $NEXT_NAME"
            PORT=3001 pm2 reload "$NEXT_NAME" --update-env
          fi

          # 等待服务启动
          echo "等待服务启动..."
          sleep 3

          # 原子切换符号链接
          echo "执行原子切换..."
          # 如果 LINK_PATH 是目录或已存在的符号链接，先删除
          if [ -e "$LINK_PATH" ] || [ -L "$LINK_PATH" ]; then
            rm -rf "$LINK_PATH"
          fi
          ln -sfn "$NEXT_DIR" "$LINK_PATH"

          # 更新 Nginx 配置
          if [ -f "$NEXT_DIR/nginx.conf" ]; then
            cp "$NEXT_DIR/nginx.conf" /www/server/panel/vhost/nginx/md.yhsun.cn.conf
            # 确保 Nginx 配置指向正确的端口
            sed -i 's/proxy_pass http:\/\/localhost:[0-9]*/proxy_pass http:\/\/localhost:3001/' /www/server/panel/vhost/nginx/md.yhsun.cn.conf
          fi

          # 重载 Nginx
          service nginx reload

          # 停止旧服务
          if [ -n "$CURRENT_NAME" ] && pm2 describe "$CURRENT_NAME" > /dev/null 2>&1; then
            echo "停止旧服务: $CURRENT_NAME"
            pm2 stop "$CURRENT_NAME" || true
            pm2 delete "$CURRENT_NAME" || true
          fi

          # 保存 PM2 配置
          pm2 save

          echo "✓ 零停机部署完成！"
          pm2 list

    - name: Setup and start print server (zero-downtime)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          set -e

          LINK_PATH="/www/wwwroot/js"
          if [ -L "$LINK_PATH" ]; then
            CURRENT_TARGET=$(readlink -f "$LINK_PATH")
            cd "$CURRENT_TARGET/print"
          else
            cd "/www/wwwroot/js_green/print"
          fi

          # 检查 Python
          if command -v python3 &> /dev/null; then
            PYTHON_CMD=python3
          elif command -v python &> /dev/null; then
            PYTHON_CMD=python
          else
            echo "错误: 未找到 Python"
            exit 1
          fi

          echo "使用 Python: $PYTHON_CMD"

          # 安装依赖
          if [ -f "requirements.txt" ]; then
            echo "安装 Python 依赖..."
            $PYTHON_CMD -m pip install --upgrade pip -q
            $PYTHON_CMD -m pip install -r requirements.txt -q
          fi

          # 零停机重启打印服务器
          echo "零停机重启打印服务器..."
          if pm2 describe print-server > /dev/null 2>&1; then
            pm2 reload print-server --update-env
          else
            pm2 start print_server.py --name "print-server" --interpreter "$PYTHON_CMD" -- --host 0.0.0.0 --port 8770
          fi

          pm2 save
          echo "✓ 打印服务器热更新完成！"

    - name: Final cleanup
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 清理临时文件
          rm -f /tmp/deploy.tar.gz

          echo ""
          echo "=========================================="
          echo "✓ 零停机部署成功完成！"
          echo "=========================================="
          pm2 list

  # 检查 print_client.py 是否变更
  check-print-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.print }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          print:
            - 'print/print_client.py'

  # 构建打印客户端（条件执行）
  build-print-client:
    needs: check-print-changes
    if: needs.check-print-changes.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
          - os: ubuntu-latest
            target: linux
            ext: ''
          - os: macos-latest
            target: macos
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r print/requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --console --name print_client_${{ matrix.target }} print/print_client.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: print_client_${{ matrix.target }}
        path: dist/print_client_${{ matrix.target }}${{ matrix.ext }}

  # 部署打印客户端到服务器
  deploy-print-client:
    needs: build-print-client
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_windows
        path: downloads

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_linux
        path: downloads

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_macos
        path: downloads

    - name: Create target directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: mkdir -p /www/wwwroot/static

    - name: Upload to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "downloads/*"
        target: "/www/wwwroot/static"
        strip_components: 1
