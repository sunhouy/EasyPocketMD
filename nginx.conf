server {
    listen 80;
    server_name md.yhsun.cn www.md.yhsun.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name md.yhsun.cn www.md.yhsun.cn;

    # SSL配置
    ssl_certificate    /www/server/panel/vhost/cert/md.yhsun.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/md.yhsun.cn/privkey.pem;

    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 静态文件根目录
    root /www/wwwroot/js/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml+rss application/json;

    # Share 实时协作 WebSocket（必须在 /api/ 之前，确保优先匹配）
    location /api/share/ws {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }

    # API 路由 - 优先处理
    location /api/ {

        proxy_pass http://127.0.0.1:3051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

    }

    # 静态资源目录
    location ^~ /static/ {
        alias /www/wwwroot/static/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # 上传文件目录
    location ^~ /uploads/ {
        alias /www/wwwroot/js/uploads/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    location ^~ /avatars/ {
        alias /www/wwwroot/js/avatars/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    location ^~ /screenshots/ {
        alias /www/wwwroot/js/screenshots/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    location ^~ /user_files/ {
        alias /www/wwwroot/js/user_files/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # Service Worker：不缓存
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 带hash的静态资源：长期缓存
    location ~* "-[a-f0-9]{8,}\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 普通静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # .mjs 文件 - JavaScript 模块
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # WASM 文本引擎产物（避免命中 SPA fallback）
    location ^~ /wasm_text_engine/ {
        try_files $uri =404;
        types {
            application/javascript js mjs;
            application/wasm wasm;
        }
        default_type application/octet-stream;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 共享模块（前后端共用的 JS 模块）
    location ^~ /shared/ {
        alias /www/wwwroot/js/shared/;
        types {
            application/javascript js;
        }
        default_type application/javascript;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback - 所有其他路由指向index.html
    location / {
        try_files $uri $uri/ /index.html;

        # HTML不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }
}
